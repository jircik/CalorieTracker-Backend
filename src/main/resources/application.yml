server:
  port: ${PORT:8080}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

fatsecret:
  worker-url: ${FATSECRET_WORKER_URL}
  proxy-key: ${FATSECRET_PROXY_KEY}

application:
  security:
    jwt-secret: ${JWT_SECRET}
    jwt-expiration-ms: 86400000
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}